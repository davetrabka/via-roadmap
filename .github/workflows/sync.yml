name: Sync Jira statuses

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  push:
    branches: [main]
    paths-ignore:
      - 'status.json'         # don't re-trigger on the sync commit itself
  workflow_dispatch:          # allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Jira statuses
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: python sync/sync.py

      - name: Commit status.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: sync Jira statuses [skip ci]" && git push
