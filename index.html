<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Via Project Planning</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f6f8fa;
  color: #1f2328;
  padding: 40px 48px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 1100px;
}

/* ── Header ──────────────────────────────────────── */
.page-header { margin-bottom: 36px; }
.page-header h1 {
  font-size: 26px;
  font-weight: 700;
  color: #1f2328;
  letter-spacing: -0.4px;
  margin-bottom: 4px;
}
.page-sub { font-size: 12px; color: #57606a; }

/* ── Root node ───────────────────────────────────── */
.root-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  background: #ddf4ff;
  border: 1px solid #a5d6fb;
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: background 0.1s;
}
.root-row:hover { background: #cce5ff; }
.root-chevron { font-size: 9px; color: #57606a; transition: transform 0.15s; }
.root-title   { font-size: 14px; font-weight: 600; color: #1f2328; flex: 1; }
.root-key {
  font-family: 'SF Mono', monospace;
  font-size: 11px; color: #0969da;
  text-decoration: none;
}
.root-key:hover { text-decoration: underline; }

.root-children { }
.root-children.hidden { display: none; }

/* ── Epic wrapper ────────────────────────────────── */
.epic-wrap {
  margin: 5px 0 5px 20px;
}

/* ── Epic header ─────────────────────────────────── */
.epic-hdr {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 14px 9px 10px;
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-left-width: 3px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.1s;
  margin-bottom: 0;
}
.epic-hdr:hover { background: #f6f8fa; }

.epic-chev { font-size: 9px; color: #8c959f; transition: transform 0.15s; flex-shrink: 0; }
.epic-wrap.collapsed .epic-chev { transform: rotate(-90deg); }
.epic-wrap.collapsed .epic-body { display: none; }

.epic-dot {
  width: 8px; height: 8px;
  border-radius: 50%; flex-shrink: 0;
}
.epic-name {
  font-size: 13px; font-weight: 600;
  color: #1f2328; flex: 1;
}
.epic-key-label {
  font-family: 'SF Mono', monospace;
  font-size: 10px; color: #8c959f;
  display: inline-block;
  vertical-align: middle;
  margin-left: 8px;
  position: relative; top: -1px;
  text-decoration: none;
}
.epic-key-label:hover { color: #0969da; text-decoration: underline; }

/* NEW EPIC warning badge */
.tag-new-epic {
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: #7d4e00; background: #fff8c5;
  border: 1px solid #d4a72c;
  border-radius: 10px; padding: 2px 7px;
  display: inline-block;
  vertical-align: middle;
  margin-left: 6px;
  position: relative; top: -1px;
}

/* ── Epic body ───────────────────────────────────── */
.epic-body { padding-bottom: 6px; }
.epic-empty { padding: 6px 14px 4px 16px; font-size: 11px; color: #8c959f; font-style: italic; }

/* ── Progress bar segments ───────────────────────── */
.ep-done    { background: #2da44e; }
.ep-active  { background: #0969da; }
.ep-beta    { background: #cf222e; }
.ep-stalled { background: #9a6700; }
.ep-todo    { background: #d0d7de; }

/* ── Group divider ───────────────────────────────── */
.group-sec { }
.group-sec.grp-collapsed .grp-body { display: none; }

.grp-hdr {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 9px 0 3px 28px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: #8c959f;
  cursor: pointer;
  user-select: none;
}
.grp-count {
  font-size: 9px; font-weight: 600;
  color: #8c959f; background: #eaeef2;
  border-radius: 8px; padding: 1px 6px;
  margin-left: 1px;
}
.grp-hdr.blocker .grp-count { color: #cf222e; background: #ffebe9; }
.grp-hdr.active  .grp-count { color: #0969da; background: #ddf4ff; }
.grp-hdr.todo    .grp-count { color: #6e40c9; background: #f3effe; }
.grp-hdr.done    .grp-count { color: #2da44e; background: #dafbe1; }
.grp-hdr.roadmap .grp-count { color: #2da44e; background: #dafbe1; }
.grp-hdr::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #d0d7de;
  margin-right: 6px;
}
.grp-hdr.active   { color: #0969da; }
.grp-hdr.blocker  { color: #cf222e; }
.grp-hdr.todo     { color: #6e40c9; }
.grp-hdr.done     { color: #2da44e; }
.grp-hdr.roadmap  { color: #2da44e; }

/* ── Ticket row ──────────────────────────────────── */
.t-row {
  display: flex;
  align-items: center;
  padding: 3px 10px 3px 28px;
  border-radius: 5px;
  cursor: default;
  min-height: 28px;
  gap: 0;
}
.t-row:hover { background: #f0f3f6; }
.t-row.has-sub { cursor: pointer; }

/* Type dot */
.t-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-right: 10px;
}
.t-dot.bug { border-radius: 2px; }

/* Key */
.t-key {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11px; color: #8c959f;
  text-decoration: none;
  width: 76px; flex-shrink: 0;
  margin-right: 12px;
  white-space: nowrap;
}
.t-key:hover { color: #0969da; }
.t-key-rm {
  font-family: 'SF Mono', monospace;
  font-size: 10px; color: #2da44e;
  background: #dafbe1;
  border-radius: 3px;
  padding: 1px 5px;
  width: 76px; flex-shrink: 0;
  margin-right: 12px;
  text-align: center;
  font-weight: 600;
}

/* Title */
.t-title {
  font-size: 12.5px;
  color: #1f2328;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-right: 8px;
}

/* Beta inline tag (appears right after title) */
.tag-beta {
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: #ffffff; background: #cf222e;
  border-radius: 10px; padding: 2px 6px;
  flex-shrink: 0;
  margin-right: 8px;
}

/* Meta */
.t-meta {
  display: flex; align-items: center;
  gap: 5px; flex-shrink: 0;
}



/* ── Sub-task rows ────────────────────────────────── */
.sub-body.hidden { display: none; }
.sub-row {
  display: flex;
  align-items: center;
  padding: 2px 10px 2px 56px;
  border-radius: 5px;
  min-height: 24px;
}
.sub-row:hover { background: #f0f3f6; }
.sub-arrow { font-size: 9px; color: #8c959f; margin-right: 8px; flex-shrink: 0; }
.sub-key {
  font-family: 'SF Mono', monospace;
  font-size: 10px; color: #8c959f;
  text-decoration: none;
  width: 68px; flex-shrink: 0;
  margin-right: 10px;
}
.sub-key:hover { color: #0969da; }
.sub-title {
  font-size: 11.5px; color: #57606a;
  flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Status badges (filled pills) ───────────────── */
.st {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.st-done    { color: #ffffff; background: #2da44e; }
.st-closed  { color: #57606a; background: #d0d7de; }
.st-active  { color: #ffffff; background: #0969da; }
.st-stalled { color: #ffffff; background: #9a6700; }
.st-todo    { color: #57606a; background: #eaeef2; }
.st-next    { color: #ffffff; background: #0550ae; }
.st-wontdo  { color: #8c959f; }

/* ── Subtask status badges (muted, smaller) ─────── */
.sub-st {
  font-size: 9px; font-weight: 600;
  padding: 1px 6px; border-radius: 8px;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.sub-st-done    { color: #1a7f37; background: #dafbe1; }
.sub-st-closed  { color: #57606a; background: #eaeef2; }
.sub-st-active  { color: #0969da; background: #ddf4ff; }
.sub-st-stalled { color: #9a6700; background: #fff3b0; }
.sub-st-todo    { color: #57606a; background: #f0f3f6; }
.sub-st-next    { color: #0550ae; background: #ddf4ff; }
.sub-st-wontdo  { color: #8c959f; }

/* ── Inline tags ─────────────────────────────────── */
.tag-rm {
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: #2da44e; background: #dafbe1;
  border-radius: 3px; padding: 1px 5px;
}
.t-owner {
  font-size: 11px; color: #8c959f;
}
.t-sub {
  font-size: 10px; color: #57606a;
  background: #eaeef2; border-radius: 8px;
  padding: 1px 6px;
}

/* ── Progress overview table ─────────────────────── */
.prog-table {
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 10px;
  padding: 6px 8px;
  margin-bottom: 24px;
}
.prog-row {
  display: flex; align-items: center; gap: 14px;
  padding: 7px 8px; border-radius: 7px;
  cursor: pointer; transition: background 0.1s;
}
.prog-row:hover { background: #f0f3f6; }
.prog-row + .prog-row { border-top: 1px solid #f0f3f6; }
.prog-label {
  font-size: 11.5px; font-weight: 600; color: #1f2328;
  width: 205px; flex-shrink: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.prog-row-overall { cursor: pointer; }
.prog-row-overall .prog-label { color: #57606a; font-weight: 500; font-size: 11px; }
.prog-row-overall .prog-chev { font-size: 10px; color: #8c959f; margin-left: -6px; margin-right: 4px; transition: transform 0.15s; flex-shrink: 0; }
.prog-table.rows-open .prog-row-overall .prog-chev { transform: rotate(90deg); }
.prog-epic-rows { display: none; border-top: 1px solid #d0d7de; margin-top: 2px; padding-top: 4px; }
.prog-table.rows-open .prog-epic-rows { display: block; }
.prog-bar {
  flex: 1; height: 20px;
  display: flex; overflow: hidden;
  border-radius: 6px; background: #eaeef2;
}
.prog-bar > div {
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; min-width: 0;
}
.prog-pct {
  font-size: 11px; font-weight: 600; color: #57606a;
  flex-shrink: 0; width: 36px; text-align: right;
}
.ep-lbl {
  font-size: 10px; font-weight: 700;
  color: rgba(255,255,255,0.95);
  white-space: nowrap; pointer-events: none;
  padding: 0 4px;
}
.ep-lbl-dark { color: rgba(86,96,106,0.9); }

/* ── Color key legend ────────────────────────────── */
.prog-legend {
  display: flex; gap: 18px; align-items: center; justify-content: flex-end;
  padding: 8px 8px 4px;
  border-top: 1px solid #eaeef2;
  margin-top: 4px;
  font-size: 10.5px; color: #57606a;
  flex-wrap: wrap;
}
.pl-item { display: flex; align-items: center; gap: 5px; }
.pl-dot  { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* ── Per-epic mini stats (filled pill badges) ────── */
.epic-stats {
  display: flex; align-items: center;
  gap: 4px; margin-left: 8px;
  flex-wrap: wrap;
}
.es-pill {
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 10px;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.es-done    { color: #ffffff; background: #2da44e; }
.es-active  { color: #ffffff; background: #0969da; }
.es-beta    { color: #ffffff; background: #cf222e; }
.es-stalled { color: #ffffff; background: #9a6700; }
.es-todo    { color: #57606a; background: #eaeef2; }

/* ── Epic accent colors ──────────────────────────── */
.ec-convo     { border-left-color: #0969da !important; }
.ec-agentic   { border-left-color: #2da44e !important; }
.ec-bookings  { border-left-color: #2da44e !important; }
.ec-itinerary { border-left-color: #1a7f37 !important; }
.ec-code      { border-left-color: #8250df !important; }
.ec-skills    { border-left-color: #bf8700 !important; }
.ec-search    { border-left-color: #0891b2 !important; }
.ec-fin       { border-left-color: #d29922 !important; }
.ec-kb        { border-left-color: #6e40c9 !important; }
.ec-evals     { border-left-color: #4493f8 !important; }
.ec-infra     { border-left-color: #bc4c00 !important; }

.d-convo     { background: #0969da; }
.d-agentic   { background: #2da44e; }
.d-bookings  { background: #2da44e; }
.d-itinerary { background: #1a7f37; }
.d-code      { background: #8250df; }
.d-skills    { background: #bf8700; }
.d-search    { background: #0891b2; }
.d-fin       { background: #d29922; }
.d-kb        { background: #6e40c9; }
.d-evals     { background: #4493f8; }
.d-infra     { background: #bc4c00; }
</style>
</head>
<body>

<div class="page-header">
  <h1>Via Project Planning</h1>
  <span class="page-sub">April 2026 &nbsp;·&nbsp; 10 capability epics &nbsp;·&nbsp; Click epics to expand/collapse</span>
</div>

<div id="stats-bar"></div>
<div id="tree"></div>

<script>
const BASE = 'https://foratravel.atlassian.net/browse/';

const EPIC_MAP = {
  'epic-convo':     { border: 'ec-convo',     dot: 'd-convo'     },
  'epic-agentic':   { border: 'ec-agentic',   dot: 'd-agentic'   },
  'epic-bookings':  { border: 'ec-bookings',  dot: 'd-bookings'  },
  'epic-itinerary': { border: 'ec-itinerary', dot: 'd-itinerary' },
  'epic-code':      { border: 'ec-code',      dot: 'd-code'      },
  'epic-skills':    { border: 'ec-skills',    dot: 'd-skills'    },
  'epic-search':    { border: 'ec-search',    dot: 'd-search'    },
  'epic-fin':       { border: 'ec-fin',       dot: 'd-fin'       },
  'epic-kb':        { border: 'ec-kb',        dot: 'd-kb'        },
  'epic-evals':     { border: 'ec-evals',     dot: 'd-evals'     },
  'epic-infra':     { border: 'ec-infra',     dot: 'd-infra'     },
};

// Maps group _cls → dot color (mirrors .grp-hdr CSS colors exactly)
const GROUP_DOT_COLORS = {
  active:  '#0969da',
  blocker: '#cf222e',
  todo:    '#6e40c9',
  done:    '#2da44e',
  roadmap: '#2da44e',
  closed:  '#8c959f',
  wontdo:  '#8c959f',
};

const STATUS_MAP = {
  'Done':             ['st-done',    'Done'],
  'Closed':           ['st-closed',  'Closed'],
  'In Progress':      ['st-active',  'In Progress'],
  'Needs Input':      ['st-stalled', 'Need Input'],
  'To do':            ['st-todo',    'To Do'],
  'To Do':            ['st-todo',    'To Do'],
  'Next Sprint':      ['st-todo',    'To Do'],
  'Wont Do':          ['st-wontdo',  "Won't Do"],
  'See Child Issues': ['st-todo',    '—'],
  'Building Phase':   ['st-active',  'Building'],
  'In Review / Addressing Feedback': ['st-active', 'In Review'],
};

function st(status) {
  const [cls, label] = STATUS_MAP[status] || ['st-todo', status];
  const display = cls === 'st-done' ? '✓' : label;
  return `<span class="st ${cls}">${display}</span>`;
}

function subSt(status) {
  const [cls, label] = STATUS_MAP[status] || ['st-todo', status];
  const subCls = cls.replace('st-', 'sub-st-');
  const display = cls === 'st-done' ? '✓' : label;
  return `<span class="sub-st ${subCls}">${display}</span>`;
}

function jkey(node) {
  if (node.roadmap) return `<span class="t-key" style="color:#d0d7de">—</span>`;
  return `<a class="t-key" href="${BASE}${node.key}" target="_blank">${node.key}</a>`;
}

function owner(name) {
  if (!name) return '';
  return `<span class="t-owner">${name.split(' ')[0]}</span>`;
}

// ── Progress bar ────────────────────────────────────────────────────────────
function renderProgressBar(s, extraCls) {
  const total = s.done + s.active + s.beta + s.stalled + s.todo;
  if (!total) return '';
  const seg = (cls, v, dark) => {
    if (!v) return '';
    const w = (v / total * 100).toFixed(1);
    const lbl = `<span class="ep-lbl${dark ? ' ep-lbl-dark' : ''}">${v}</span>`;
    return `<div class="ep-${cls}" style="width:${w}%">${lbl}</div>`;
  };
  const segs = [
    seg('done',    s.done,    false),
    seg('active',  s.active,  false),
    seg('beta',    s.beta,    false),
    seg('stalled', s.stalled, false),
    seg('todo',    s.todo,    true),
  ].join('');
  return `<div class="${extraCls || 'prog-bar'}">${segs}</div>`;
}

// ── Render root ─────────────────────────────────────────────────────────────
function renderRoot(node) {
  let inner = '';
  for (const child of (node.children || [])) inner += renderEpic(child);

  return `
<div>
  <div class="root-row" onclick="this.nextElementSibling.classList.toggle('hidden');this.querySelector('.root-chevron').style.transform=this.nextElementSibling.classList.contains('hidden')?'rotate(-90deg)':''">
    <span class="root-chevron">▼</span>
    <span class="root-title">${node.summary}</span>
    <a class="root-key" href="${BASE}${node.key}" target="_blank" onclick="event.stopPropagation()">${node.key}</a>
    ${st(node.status)}
  </div>
  <div class="root-children">
    ${inner}
  </div>
</div>`;
}

// ── Render epic ──────────────────────────────────────────────────────────────
function renderEpic(node) {
  const ec = node.epicClass ? (EPIC_MAP[node.epicClass] || {}) : {};
  const borderCls = ec.border || '';
  const dotCls    = ec.dot    || '';

  const children = (node.children || []).slice().sort((a, b) => {
    const aB = a._cls === 'blocker' ? 0 : 1;
    const bB = b._cls === 'blocker' ? 0 : 1;
    return aB - bB;
  });
  let body = '';
  for (const child of children) {
    if (child._group) body += renderGroup(child);
    else              body += renderTicket(child, '');
  }

  const epicStats = countStats(node);
  const isNewEpic = node.key.startsWith('AEP-NEW-');
  const newEpicBadge = isNewEpic ? ` <span class="tag-new-epic">new epic</span>` : '';
  const keyHtml = isNewEpic ? '' : `<a class="epic-key-label" href="${BASE}${node.key}" target="_blank" onclick="event.stopPropagation()">${node.key}</a>`;
  const titleSuffix = newEpicBadge + keyHtml;

  const epicId = node.epicClass || node.key.replace(/[^a-zA-Z0-9]/g, '-');

  return `
<div class="epic-wrap" id="${epicId}">
  <div class="epic-hdr ${borderCls}" onclick="this.parentElement.classList.toggle('collapsed')">
    <span class="epic-chev">▼</span>
    <span class="epic-dot ${dotCls}"></span>
    <span class="epic-name">${node.summary}${titleSuffix}</span>
    ${renderMiniStats(epicStats)}
  </div>
  <div class="epic-body">${body || '<div class="epic-empty">No tickets</div>'}</div>
</div>`;
}

// ── Render group ─────────────────────────────────────────────────────────────
function renderGroup(node) {
  const cls = node._cls || '';
  const isCollapsed = ['done', 'closed', 'wontdo'].includes(cls);
  const dotColor = GROUP_DOT_COLORS[cls] || '#8c959f';
  const count = (node.children || []).length;

  let rows = '';
  for (const child of (node.children || [])) rows += renderTicket(child, dotColor);

  return `
<div class="group-sec${isCollapsed ? ' grp-collapsed' : ''}">
  <div class="grp-hdr ${cls}" onclick="this.parentElement.classList.toggle('grp-collapsed')">
    ${node._group}<span class="grp-count">${count}</span>
  </div>
  <div class="grp-body">${rows}</div>
</div>`;
}

// ── Render ticket ────────────────────────────────────────────────────────────
function renderTicket(node, dotColor) {
  if (node.type === 'Sub-task') return renderSub(node);

  const dotStyle = dotColor ? `background:${dotColor}` : 'background:#8c959f';
  const isBug = node.type === 'Bug';
  const subs = (node.children || []).filter(c => c.type === 'Sub-task');

  let subHtml = '';
  if (subs.length) {
    subHtml = `<div class="sub-body">`;
    for (const s of subs) subHtml += renderSub(s);
    subHtml += `</div>`;
  }

  const toggle = subs.length
    ? `onclick="const b=this.parentElement.querySelector('.sub-body');b.classList.toggle('hidden')"`
    : '';

  return `
<div>
  <div class="t-row${subs.length ? ' has-sub' : ''}" ${toggle}>
    <span class="t-dot${isBug ? ' bug' : ''}" style="${dotStyle}"></span>
    ${jkey(node)}
    <span class="t-title">${node.summary}</span>
    ${node.beta ? '<span class="tag-beta">beta</span>' : ''}
    <div class="t-meta">
      ${st(node.status)}
    </div>
  </div>
  ${subHtml}
</div>`;
}

// ── Render subtask ────────────────────────────────────────────────────────────
function renderSub(node) {
  return `
<div class="sub-row">

// ── Stats ─────────────────────────────────────────────────────────────────────
function countStats(node, s) {
  if (!s) s = { done: 0, active: 0, beta: 0, stalled: 0, todo: 0 };
  if (node._group) {
    for (const c of (node.children || [])) countStats(c, s);
    return s;
  }
  const t = node.type;
  if (t === 'Sub-task' || t === 'Epic' || t === 'Idea') {
    for (const c of (node.children || [])) countStats(c, s);
    return s;
  }
  const isDone = node.status === 'Done' || node.status === 'Closed';
  if (node.beta && isDone)                                     s.done++;
  else if (node.beta)                                          s.beta++;
  else if (isDone)                                             s.done++;
  else if (node.status === 'In Progress')                      s.active++;
  else if (node.status === 'Needs Input')                      s.stalled++;
  else if (node.status !== 'Wont Do')                          s.todo++;
  for (const c of (node.children || [])) countStats(c, s);
  return s;
}

function renderMiniStats(s) {
  const parts = [];
  if (s.done    > 0) parts.push(`<span class="es-pill es-done">✓ ${s.done}</span>`);
  if (s.active  > 0) parts.push(`<span class="es-pill es-active">${s.active} active</span>`);
  if (s.beta    > 0) parts.push(`<span class="es-pill es-beta">${s.beta} beta blocker${s.beta === 1 ? '' : 's'}</span>`);
  if (s.stalled > 0) parts.push(`<span class="es-pill es-stalled">${s.stalled} need input</span>`);
  if (s.todo    > 0) parts.push(`<span class="es-pill es-todo">${s.todo} to do</span>`);
  if (!parts.length) return '';
  return `<div class="epic-stats">${parts.join('')}</div>`;
}

// Progress overview table
function renderProgRow(label, s, id, isOverall) {
  const total = s.done + s.active + s.beta + s.stalled + s.todo;
  const clickHandler = id ? `onclick="document.getElementById('${id}').scrollIntoView({behavior:'smooth',block:'start'})"` : '';
  const chev = isOverall ? `<span class="prog-chev">▶</span>` : '';
  const right = total === 0
    ? `<span class="prog-pct" style="color:#8c959f;font-style:italic;white-space:nowrap">no tickets</span>`
    : `${renderProgressBar(s)}<span class="prog-pct">${Math.round(s.done / total * 100)}%</span>`;
  return `
  <div class="prog-row${isOverall ? ' prog-row-overall' : ''}" ${clickHandler}>
    ${chev}<span class="prog-label">${label}</span>
    ${right}
  </div>`;
}

const legend = `
<div class="prog-legend">
  <span class="pl-item"><span class="pl-dot" style="background:#2da44e"></span>Done / Closed</span>
  <span class="pl-item"><span class="pl-dot" style="background:#0969da"></span>In Progress</span>
  <span class="pl-item"><span class="pl-dot" style="background:#cf222e"></span>Beta Blockers</span>
  <span class="pl-item"><span class="pl-dot" style="background:#9a6700"></span>Need Input</span>
  <span class="pl-item"><span class="pl-dot" style="background:#d0d7de"></span>Roadmap / To Do</span>
</div>`;

function renderAll() {
  const globalStats = countStats(data);

  const overallRow = renderProgRow('All epics', globalStats, null, true);
  let epicRows = '';
  for (const epic of (data.children || [])) {
    const s = countStats(epic);
    const id = epic.epicClass || epic.key.replace(/[^a-zA-Z0-9]/g, '-');
    const label = epic.summary.replace(/^Via:\s*/i, '');
    epicRows += renderProgRow(label, s, id, false);
  }

  const statsBar = document.getElementById('stats-bar');
  statsBar.innerHTML = '';
  const table = document.createElement('div');
  table.className = 'prog-table';
  table.innerHTML = overallRow + `<div class="prog-epic-rows">${epicRows}</div>` + legend;
  table.querySelector('.prog-row-overall').addEventListener('click', () => table.classList.toggle('rows-open'));
  statsBar.appendChild(table);

  document.getElementById('tree').innerHTML = renderRoot(data);
}

renderAll();
